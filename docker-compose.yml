version: "3.9"

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: opcwc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: opcwc
      POSTGRES_PASSWORD: opcwc
      POSTGRES_DB: opcwc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opcwc -d opcwc"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opcwc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
