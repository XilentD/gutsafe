name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: opcwc
          POSTGRES_PASSWORD: opcwc
          POSTGRES_DB: opcwc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable && corepack prepare pnpm@9 --activate

      - run: pnpm install

      - name: Run database migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          GAODE_JS_API_KEY: ${{ secrets.GAODE_JS_API_KEY }}
          GAODE_WEB_API_KEY: ${{ secrets.GAODE_WEB_API_KEY }}
          NEXT_PUBLIC_GAODE_JS_API_KEY: ${{ secrets.GAODE_JS_API_KEY }}

      - name: Package for deploy
        run: |
          tar -czf deploy.tar.gz \
            --warning=no-file-changed \
            --exclude='node_modules' --exclude='.git' --exclude='.next' \
            --exclude='.pgdata' --exclude='data/processed' --exclude='data/raw' \
            --exclude='android' --exclude='.claude' \
            src/ .next/ prisma/ public/ scripts/ package.json pnpm-lock.yaml next.config.ts tsconfig.json \
            tailwind.config.ts postcss.config.mjs vitest.config.ts \
            capacitor.config.ts deno.json \
            .env.example docker-compose.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: latest
          tag_name: latest
          prerelease: true
          files: deploy.tar.gz
