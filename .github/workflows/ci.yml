name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: opcwc
          POSTGRES_PASSWORD: opcwc
          POSTGRES_DB: opcwc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          GAODE_JS_API_KEY: ${{ secrets.GAODE_JS_API_KEY }}
          GAODE_WEB_API_KEY: ${{ secrets.GAODE_WEB_API_KEY }}
          NEXT_PUBLIC_GAODE_JS_API_KEY: ${{ secrets.GAODE_JS_API_KEY }}
