name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: opcwc
          POSTGRES_PASSWORD: opcwc
          POSTGRES_DB: opcwc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install

      - name: Run database migrations
        run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://opcwc:opcwc@localhost:5432/opcwc?schema=public
          AUTH_SECRET: ci-test-secret-do-not-use-in-production
          GAODE_JS_API_KEY: ${{ secrets.GAODE_JS_API_KEY }}
          GAODE_WEB_API_KEY: ${{ secrets.GAODE_WEB_API_KEY }}
          NEXT_PUBLIC_GAODE_JS_API_KEY: ${{ secrets.GAODE_JS_API_KEY }}

      - name: Package for deploy
        run: |
          tar -czf deploy.tar.gz \
            --exclude='node_modules' --exclude='.git' --exclude='.next/cache' \
            --exclude='.pgdata' --exclude='data/processed' --exclude='data/raw' \
            --exclude='android' \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-package
          path: deploy.tar.gz

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-package

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Restart app
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/gutsafe
            mkdir -p /opt/gutsafe
            tar -xzf /tmp/deploy.tar.gz -C /opt/gutsafe
            cd /opt/gutsafe
            npm install --silent 2>&1 | tail -3
            npm run build 2>&1 | tail -5
            pm2 restart gutsafe
            sleep 3
            curl -sf -o /dev/null http://localhost:80/login && echo "✓ Deploy OK" || echo "⚠ Deploy finished but health check failed"
